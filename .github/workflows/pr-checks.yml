name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    name: Backend checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports
        run: python -c "import backend.main; print('✅ Backend imports OK')"

      - name: Check syntax
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/github_client.py
          python -m py_compile backend/llm_reviewer.py
          python -m py_compile backend/db.py
          python -m py_compile backend/config.py
          echo "✅ No syntax errors"

  frontend-checks:
    runs-on: ubuntu-latest
    name: Frontend checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint